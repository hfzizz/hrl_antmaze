environment:
  name: AntMaze_UMaze-v5
  render_mode: human

agent:
  type: SAC
  learning_rate: 0.0003
  buffer_size: 1000000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  update_interval: 1
  target_update_interval: 1
  hidden_size: 256
  num_hidden_layers: 2

training:
  num_episodes: 1000
  max_steps_per_episode: 1000
  save_model_interval: 100
  evaluation_interval: 10

logging:
  log_dir: ./logs
  log_interval: 10
  save_model: true